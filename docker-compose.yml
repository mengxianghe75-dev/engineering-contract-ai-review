services:
  postgres:
    image: postgres:16
    container_name: contract-review-postgres
    environment:
      POSTGRES_DB: contract_review
      POSTGRES_USER: contract_review
      POSTGRES_PASSWORD: contract_review
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract_review -d contract_review"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: contract-review-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://contract_review:contract_review@postgres:5432/contract_review
      JWT_SECRET_KEY: change-this-in-production
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 120
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: Admin123456
      UPLOAD_DIR: uploads
      REVIEW_PROVIDER: mock
      LLM_BASE_URL: ""
      LLM_API_KEY: ""
      LLM_MODEL: ""
      LLM_TIMEOUT_SECONDS: 30
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    container_name: contract-review-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres_data:
  backend_uploads:
